<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picopy — Extract Text from Photos</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    header span { font-size: 13px; color: #888; }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    #left {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e0e0e0;
      background: #fff;
      overflow: hidden;
    }

    #drop-zone {
      margin: 20px;
      border: 2px dashed #c8c8cc;
      border-radius: 14px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    #drop-zone.drag-over { border-color: #0071e3; background: #eaf3ff; }

    #drop-zone svg { display: block; margin: 0 auto 12px; opacity: 0.4; }
    #drop-zone p { font-size: 14px; color: #666; line-height: 1.6; }
    #drop-zone strong { color: #0071e3; cursor: pointer; }
    #drop-zone input { display: none; }

    #image-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .image-card {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
      background: #fafafa;
    }

    .image-card img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      display: block;
    }

    .image-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      font-size: 12px;
      color: #888;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    .badge.processing { background: #fff3cd; color: #856404; }
    .badge.done       { background: #d4edda; color: #155724; }
    .badge.error      { background: #f8d7da; color: #721c24; }

    .progress-bar-wrap {
      height: 3px;
      background: #e0e0e0;
    }

    .progress-bar {
      height: 100%;
      background: #0071e3;
      transition: width 0.3s;
    }

    /* ── RIGHT PANEL ── */
    #right {
      width: 50%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
    }

    #right-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #right-header h2 { font-size: 15px; font-weight: 600; }

    #copy-all-btn {
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid #c8c8cc;
      background: #f5f5f7;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
      display: none;
    }

    #copy-all-btn:hover { background: #e8e8ed; }

    #text-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #aaa;
      text-align: center;
      gap: 10px;
    }

    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 14px; }

    .text-block {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
    }

    .text-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #f5f5f7;
      border-bottom: 1px solid #e0e0e0;
      font-size: 12px;
      color: #666;
    }

    .text-block-header span { font-weight: 600; color: #1d1d1f; }

    .copy-btn {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #c8c8cc;
      background: #fff;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }

    .copy-btn:hover { background: #e8e8ed; }
    .copy-btn.copied { background: #d4edda; border-color: #a3d9a5; color: #155724; }

    textarea {
      width: 100%;
      padding: 12px;
      font-size: 13px;
      font-family: "SF Mono", "Fira Mono", monospace;
      line-height: 1.6;
      border: none;
      resize: vertical;
      min-height: 120px;
      background: #fff;
      color: #1d1d1f;
      outline: none;
    }

    .processing-placeholder {
      padding: 16px 12px;
      font-size: 13px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #ddd;
      border-top-color: #0071e3;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
    <rect width="28" height="28" rx="7" fill="#0071e3"/>
    <path d="M7 9h14M7 14h10M7 19h8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <h1>Picopy</h1>
  <span>Upload photos &rarr; Copy the text</span>
</header>

<main>
  <!-- LEFT -->
  <div id="left">
    <div id="drop-zone">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect x="4" y="8" width="32" height="24" rx="4" stroke="#666" stroke-width="2"/>
        <circle cx="14" cy="17" r="3" stroke="#666" stroke-width="2"/>
        <path d="M4 28l8-7 6 6 5-4 9 7" stroke="#666" stroke-width="2" stroke-linejoin="round"/>
      </svg>
      <p>Drag &amp; drop photos here<br>or <strong id="browse-link">browse files</strong></p>
      <p style="font-size:11px;margin-top:6px;color:#aaa">JPG, PNG, WEBP, BMP — multiple files OK</p>
      <input type="file" id="file-input" accept="image/*" multiple>
    </div>
    <div id="image-list"></div>
  </div>

  <!-- RIGHT -->
  <div id="right">
    <div id="right-header">
      <h2>Extracted Text</h2>
      <button id="copy-all-btn">Copy All</button>
    </div>
    <div id="text-list">
      <div class="empty-state" id="empty-state">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="6" y="10" width="36" height="28" rx="5" stroke="#ccc" stroke-width="2"/>
          <path d="M13 19h22M13 25h16M13 31h10" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p>Extracted text will appear here<br>once you upload photos.</p>
      </div>
    </div>
  </div>
</main>

<script>
  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const browseLink  = document.getElementById('browse-link');
  const imageList   = document.getElementById('image-list');
  const textList    = document.getElementById('text-list');
  const emptyState  = document.getElementById('empty-state');
  const copyAllBtn  = document.getElementById('copy-all-btn');

  let jobCounter = 0;

  // ── Drop zone events ──
  browseLink.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('click', e => { if (e.target !== browseLink) fileInput.click(); });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
  });

  fileInput.addEventListener('change', () => {
    handleFiles([...fileInput.files]);
    fileInput.value = '';
  });

  function handleFiles(files) {
    if (!files.length) return;
    emptyState.remove();
    copyAllBtn.style.display = 'inline-flex';
    files.forEach(processFile);
  }

  function processFile(file) {
    const id = ++jobCounter;
    const url = URL.createObjectURL(file);
    const name = file.name.length > 28 ? file.name.slice(0, 25) + '…' : file.name;

    // ── Image card (left) ──
    const card = document.createElement('div');
    card.className = 'image-card';
    card.id = `card-${id}`;
    card.innerHTML = `
      <div class="progress-bar-wrap"><div class="progress-bar" id="pb-${id}" style="width:0%"></div></div>
      <img src="${url}" alt="${name}">
      <div class="image-card-footer">
        <span>${name}</span>
        <span class="badge processing" id="badge-${id}">
          <span class="spinner"></span> Processing…
        </span>
      </div>`;
    imageList.appendChild(card);

    // ── Text block (right) ──
    const block = document.createElement('div');
    block.className = 'text-block';
    block.id = `block-${id}`;
    block.innerHTML = `
      <div class="text-block-header">
        <span>${name}</span>
        <button class="copy-btn" id="copybtn-${id}" disabled>Copy</button>
      </div>
      <div class="processing-placeholder" id="placeholder-${id}">
        <div class="spinner"></div> Extracting text…
      </div>`;
    textList.appendChild(block);

    // ── Run Tesseract ──
    Tesseract.recognize(file, 'eng', {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round(m.progress * 100);
          document.getElementById(`pb-${id}`).style.width = pct + '%';
        }
      }
    }).then(({ data: { text } }) => {
      const cleaned = text.trim();

      document.getElementById(`badge-${id}`).className = 'badge done';
      document.getElementById(`badge-${id}`).innerHTML = '&#10003; Done';
      document.getElementById(`pb-${id}`).style.width = '100%';

      const placeholder = document.getElementById(`placeholder-${id}`);
      const ta = document.createElement('textarea');
      ta.id = `ta-${id}`;
      ta.value = cleaned || '(No text detected)';
      ta.rows = Math.max(4, Math.min(cleaned.split('\n').length + 2, 14));
      placeholder.replaceWith(ta);

      const btn = document.getElementById(`copybtn-${id}`);
      btn.disabled = false;
      btn.addEventListener('click', () => copyText(ta.value, btn));

    }).catch(err => {
      console.error(err);
      document.getElementById(`badge-${id}`).className = 'badge error';
      document.getElementById(`badge-${id}`).innerHTML = '&#x26A0; Error';

      const placeholder = document.getElementById(`placeholder-${id}`);
      placeholder.textContent = 'Could not extract text from this image.';
    });
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
    });
  }

  copyAllBtn.addEventListener('click', () => {
    const allText = [...document.querySelectorAll('textarea')]
      .map((ta, i) => `[Image ${i + 1}]\n${ta.value}`)
      .join('\n\n---\n\n');
    copyText(allText, copyAllBtn);
    copyAllBtn.textContent = 'Copied All!';
    setTimeout(() => { copyAllBtn.textContent = 'Copy All'; }, 1800);
  });
</script>
</body>
</html>
