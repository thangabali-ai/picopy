<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picopy — Extract Text from Photos</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── THEME TOKENS ── */
    :root {
      --bg-from: #e8e4f5;
      --bg-to:   #f0ece8;
      --orb1:    rgba(160, 130, 230, 0.35);
      --orb2:    rgba(200, 180, 255, 0.25);
      --orb3:    rgba(230, 210, 255, 0.2);
      --glass-bg:     rgba(255, 255, 255, 0.52);
      --glass-border: rgba(255, 255, 255, 0.75);
      --glass-shadow: rgba(140, 100, 220, 0.12);
      --panel-bg:     rgba(255, 255, 255, 0.38);
      --panel-border: rgba(255, 255, 255, 0.65);
      --divider:      rgba(180, 160, 220, 0.25);
      --text-primary:   #1a1025;
      --text-secondary: #5a4e72;
      --text-muted:     #9080a8;
      --accent:         #7c5cbf;
      --accent-soft:    rgba(124, 92, 191, 0.12);
      --accent-hover:   rgba(124, 92, 191, 0.22);
      --badge-proc-bg:  rgba(255, 200, 80, 0.2);
      --badge-proc-txt: #7a5c00;
      --badge-done-bg:  rgba(80, 200, 120, 0.18);
      --badge-done-txt: #1a6b3a;
      --badge-err-bg:   rgba(220, 80, 80, 0.15);
      --badge-err-txt:  #8b1a1a;
      --textarea-bg:    rgba(255, 255, 255, 0.55);
      --textarea-color: #1a1025;
      --drop-dashed:    rgba(124, 92, 191, 0.4);
      --drop-hover-bg:  rgba(124, 92, 191, 0.07);
      --scrollbar:      rgba(124, 92, 191, 0.2);
      --header-bg:      rgba(255, 255, 255, 0.6);
    }

    [data-theme="dark"] {
      --bg-from: #0f0b1a;
      --bg-to:   #1a1228;
      --orb1:    rgba(120, 80, 200, 0.4);
      --orb2:    rgba(80, 50, 160, 0.3);
      --orb3:    rgba(160, 100, 255, 0.2);
      --glass-bg:     rgba(30, 20, 50, 0.55);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: rgba(80, 40, 160, 0.3);
      --panel-bg:     rgba(25, 15, 45, 0.5);
      --panel-border: rgba(255, 255, 255, 0.08);
      --divider:      rgba(120, 80, 200, 0.25);
      --text-primary:   #f0eaff;
      --text-secondary: #b8a8d8;
      --text-muted:     #7a6898;
      --accent:         #a87ef0;
      --accent-soft:    rgba(168, 126, 240, 0.15);
      --accent-hover:   rgba(168, 126, 240, 0.25);
      --badge-proc-bg:  rgba(200, 150, 30, 0.2);
      --badge-proc-txt: #f0c860;
      --badge-done-bg:  rgba(60, 180, 100, 0.18);
      --badge-done-txt: #70e0a0;
      --badge-err-bg:   rgba(220, 70, 70, 0.2);
      --badge-err-txt:  #f08080;
      --textarea-bg:    rgba(20, 12, 38, 0.5);
      --textarea-color: #e8e0f8;
      --drop-dashed:    rgba(168, 126, 240, 0.4);
      --drop-hover-bg:  rgba(168, 126, 240, 0.1);
      --scrollbar:      rgba(168, 126, 240, 0.25);
      --header-bg:      rgba(15, 10, 28, 0.65);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      transition: color 0.35s;
    }

    /* ── ANIMATED BACKGROUND ── */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
      transition: background 0.5s;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      transition: background 0.5s;
      pointer-events: none;
    }

    .orb-1 {
      width: 520px; height: 520px;
      top: -160px; left: -120px;
      background: var(--orb1);
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 400px; height: 400px;
      bottom: -100px; right: -80px;
      background: var(--orb2);
      animation: drift2 22s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 300px; height: 300px;
      top: 40%; left: 45%;
      background: var(--orb3);
      animation: drift3 16s ease-in-out infinite alternate;
    }

    @keyframes drift1 { to { transform: translate(60px, 80px) scale(1.08); } }
    @keyframes drift2 { to { transform: translate(-50px, -60px) scale(1.1); } }
    @keyframes drift3 { to { transform: translate(40px, -50px) scale(0.92); } }

    /* ── LAYOUT ── */
    header, main { position: relative; z-index: 1; }

    header {
      padding: 14px 24px;
      background: var(--header-bg);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      transition: background 0.35s, border-color 0.35s;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #9b6dff 0%, #6a3fcf 100%);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(100, 60, 200, 0.4);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--text-primary);
      transition: color 0.35s;
    }

    header .tagline {
      font-size: 12px;
      color: var(--text-muted);
      margin-right: auto;
      transition: color 0.35s;
    }

    #theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      transition: background 0.2s, border-color 0.2s, color 0.35s;
      white-space: nowrap;
      letter-spacing: 0.1px;
    }
    #theme-toggle:hover { background: var(--accent-hover); }
    #theme-toggle .icon { font-size: 14px; line-height: 1; }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 16px;
      padding: 16px;
    }

    /* ── GLASS PANEL BASE ── */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(28px) saturate(1.6);
      -webkit-backdrop-filter: blur(28px) saturate(1.6);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 8px 40px var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.4);
      transition: background 0.35s, border-color 0.35s, box-shadow 0.35s;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    #left {
      width: 50%;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      font-size: 11px;
      transition: color 0.35s;
    }

    #drop-zone {
      margin: 14px;
      border: 1.5px dashed var(--drop-dashed);
      border-radius: 14px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      flex-shrink: 0;
      background: var(--accent-soft);
    }

    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--drop-hover-bg);
    }

    #drop-zone .upload-icon {
      width: 44px; height: 44px;
      background: var(--accent-soft);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
      border: 1px solid var(--drop-dashed);
    }

    #drop-zone p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
      transition: color 0.35s;
    }

    #drop-zone strong {
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
    }

    #drop-zone .hint {
      font-size: 11px;
      margin-top: 5px;
      color: var(--text-muted);
      transition: color 0.35s;
    }

    #drop-zone input { display: none; }

    #image-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .image-card {
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.35s, border-color 0.35s;
    }

    .image-card img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      display: block;
    }

    .image-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-secondary);
      transition: color 0.35s;
    }

    .image-card-footer .filename {
      font-weight: 500;
      color: var(--text-primary);
      transition: color 0.35s;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.1px;
    }

    .badge.processing { background: var(--badge-proc-bg); color: var(--badge-proc-txt); }
    .badge.done       { background: var(--badge-done-bg); color: var(--badge-done-txt); }
    .badge.error      { background: var(--badge-err-bg);  color: var(--badge-err-txt); }

    .progress-bar-wrap { height: 2px; background: var(--divider); }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #9b6dff, #6a3fcf); transition: width 0.3s; }

    /* ── RIGHT PANEL ── */
    #right {
      width: 50%;
      display: flex;
      flex-direction: column;
    }

    #right-panel-header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #copy-all-btn {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: linear-gradient(135deg, rgba(155,109,255,0.25), rgba(106,63,207,0.2));
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
      display: none;
      letter-spacing: 0.1px;
    }
    #copy-all-btn:hover { background: linear-gradient(135deg, rgba(155,109,255,0.38), rgba(106,63,207,0.32)); transform: scale(1.02); }

    #text-list {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      text-align: center;
      gap: 12px;
      transition: color 0.35s;
    }

    .empty-icon {
      width: 64px; height: 64px;
      background: var(--accent-soft);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--drop-dashed);
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.7;
      transition: color 0.35s;
    }

    .text-block {
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.35s, border-color 0.35s;
    }

    .text-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      background: var(--accent-soft);
      border-bottom: 1px solid var(--divider);
      font-size: 12px;
      color: var(--text-secondary);
      transition: background 0.35s, color 0.35s;
    }

    .text-block-header .block-name {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 12px;
      transition: color 0.35s;
    }

    .copy-btn {
      font-size: 11px;
      padding: 4px 11px;
      border-radius: 12px;
      border: 1px solid var(--drop-dashed);
      background: var(--glass-bg);
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.1px;
    }
    .copy-btn:hover:not(:disabled) { background: var(--accent-hover); transform: scale(1.03); }
    .copy-btn:disabled { opacity: 0.4; cursor: default; }
    .copy-btn.copied { background: var(--badge-done-bg); border-color: transparent; color: var(--badge-done-txt); }

    textarea {
      width: 100%;
      padding: 12px 14px;
      font-size: 13px;
      font-family: "SF Mono", "Fira Mono", "Menlo", monospace;
      line-height: 1.7;
      border: none;
      resize: vertical;
      min-height: 110px;
      background: var(--textarea-bg);
      color: var(--textarea-color);
      outline: none;
      transition: background 0.35s, color 0.35s;
    }

    .processing-placeholder {
      padding: 16px 14px;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color 0.35s;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 13px; height: 13px;
      border: 2px solid var(--divider);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* ── SCROLLBARS ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 10px; }
  </style>
</head>
<body>

<!-- Background -->
<div id="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Header -->
<header>
  <div class="logo-icon">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M3 5h12M3 9h8M3 13h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </div>
  <h1>Picopy</h1>
  <span class="tagline">Upload photos &rarr; Copy the text</span>
  <button id="theme-toggle">
    <span class="icon" id="theme-icon">☀️</span>
    <span id="theme-label">Light</span>
  </button>
</header>

<!-- Main -->
<main>

  <!-- LEFT -->
  <div id="left" class="glass-panel">
    <div class="panel-header">
      <span class="panel-title">Photos</span>
    </div>
    <div id="drop-zone">
      <div class="upload-icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="2" y="4" width="18" height="14" rx="3" stroke="currentColor" stroke-width="1.5" style="color:var(--accent)"/>
          <circle cx="8" cy="10" r="2" stroke="currentColor" stroke-width="1.5" style="color:var(--accent)"/>
          <path d="M2 16l5-4 4 4 3-2.5 6 4" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" style="color:var(--accent)"/>
        </svg>
      </div>
      <p>Drag &amp; drop photos here<br>or <strong id="browse-link">browse files</strong></p>
      <p class="hint">JPG, PNG, WEBP, BMP &mdash; multiple files OK</p>
      <input type="file" id="file-input" accept="image/*" multiple>
    </div>
    <div id="image-list"></div>
  </div>

  <!-- RIGHT -->
  <div id="right" class="glass-panel">
    <div id="right-panel-header" class="panel-header">
      <span class="panel-title">Extracted Text</span>
      <button id="copy-all-btn">Copy All</button>
    </div>
    <div id="text-list">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
            <rect x="4" y="6" width="22" height="18" rx="3" stroke="currentColor" stroke-width="1.5" style="color:var(--accent)"/>
            <path d="M8 12h14M8 16h10M8 20h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="color:var(--accent)"/>
          </svg>
        </div>
        <p>Extracted text will appear here<br>once you upload photos.</p>
      </div>
    </div>
  </div>

</main>

<script>
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const browseLink = document.getElementById('browse-link');
  const imageList  = document.getElementById('image-list');
  const textList   = document.getElementById('text-list');
  const emptyState = document.getElementById('empty-state');
  const copyAllBtn = document.getElementById('copy-all-btn');
  const themeBtn   = document.getElementById('theme-toggle');
  const themeIcon  = document.getElementById('theme-icon');
  const themeLabel = document.getElementById('theme-label');

  let jobCounter = 0;
  let isDark = false;

  // ── Theme toggle ──
  themeBtn.addEventListener('click', () => {
    isDark = !isDark;
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    themeIcon.textContent  = isDark ? '🌙' : '☀️';
    themeLabel.textContent = isDark ? 'Dark' : 'Light';
  });

  // ── Drop zone ──
  browseLink.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
  });

  fileInput.addEventListener('change', () => { handleFiles([...fileInput.files]); fileInput.value = ''; });

  function handleFiles(files) {
    if (!files.length) return;
    if (emptyState.parentNode) emptyState.remove();
    copyAllBtn.style.display = 'inline-flex';
    files.forEach(processFile);
  }

  function processFile(file) {
    const id   = ++jobCounter;
    const url  = URL.createObjectURL(file);
    const name = file.name.length > 28 ? file.name.slice(0, 25) + '…' : file.name;

    // Image card
    const card = document.createElement('div');
    card.className = 'image-card';
    card.id = `card-${id}`;
    card.innerHTML = `
      <div class="progress-bar-wrap"><div class="progress-bar" id="pb-${id}" style="width:0%"></div></div>
      <img src="${url}" alt="${name}">
      <div class="image-card-footer">
        <span class="filename">${name}</span>
        <span class="badge processing" id="badge-${id}"><span class="spinner"></span> Processing</span>
      </div>`;
    imageList.appendChild(card);

    // Text block
    const block = document.createElement('div');
    block.className = 'text-block';
    block.id = `block-${id}`;
    block.innerHTML = `
      <div class="text-block-header">
        <span class="block-name">${name}</span>
        <button class="copy-btn" id="copybtn-${id}" disabled>Copy</button>
      </div>
      <div class="processing-placeholder" id="placeholder-${id}">
        <div class="spinner"></div> Extracting text…
      </div>`;
    textList.appendChild(block);

    // Tesseract
    Tesseract.recognize(file, 'eng', {
      logger: m => {
        if (m.status === 'recognizing text') {
          document.getElementById(`pb-${id}`).style.width = Math.round(m.progress * 100) + '%';
        }
      }
    }).then(({ data: { text } }) => {
      const cleaned = text.trim();

      const badge = document.getElementById(`badge-${id}`);
      badge.className = 'badge done';
      badge.innerHTML = '&#10003; Done';
      document.getElementById(`pb-${id}`).style.width = '100%';

      const ta = document.createElement('textarea');
      ta.id = `ta-${id}`;
      ta.value = cleaned || '(No text detected)';
      ta.rows = Math.max(4, Math.min(cleaned.split('\n').length + 2, 14));
      document.getElementById(`placeholder-${id}`).replaceWith(ta);

      const btn = document.getElementById(`copybtn-${id}`);
      btn.disabled = false;
      btn.addEventListener('click', () => copyText(ta.value, btn));

    }).catch(err => {
      console.error(err);
      const badge = document.getElementById(`badge-${id}`);
      badge.className = 'badge error';
      badge.innerHTML = '&#9888; Error';
      document.getElementById(`placeholder-${id}`).textContent = 'Could not extract text from this image.';
    });
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
    });
  }

  copyAllBtn.addEventListener('click', () => {
    const all = [...document.querySelectorAll('textarea')]
      .map((ta, i) => `[Image ${i + 1}]\n${ta.value}`)
      .join('\n\n---\n\n');
    copyText(all, copyAllBtn);
    copyAllBtn.textContent = 'Copied All!';
    setTimeout(() => { copyAllBtn.textContent = 'Copy All'; }, 1800);
  });
</script>
</body>
</html>
